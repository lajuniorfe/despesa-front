@if(carregando){
<div class="flex justify-center items-center h-screen">
  <p-progress-spinner ariaLabel="Carregando..." />
</div>

}@else {
<article class="flex flex-column align-items-center gap-3 mt-5">
  <div class="w-full md:w-10">
    <app-principal [valorDespesasMesAtual]="valorTotalDespesasMes"></app-principal>
  </div>

  <div class="w-full md:w-10">
    <div class="grid">
      <div class="col-12 md:col-6 p-1">
        <app-exibir-despesas [listaDespesasRecebida]="listaDespesaMesAtual"></app-exibir-despesas>
      </div>

      <div class="col-12 md:col-6 p-1">
        <app-exibir-cartoes [listaAgrupadas]="listaAgrupada"></app-exibir-cartoes>
      </div>
    </div>
  </div>
</article>
}
