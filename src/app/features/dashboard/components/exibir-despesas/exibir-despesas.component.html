<div class="card bg-blue-50 h-30rem flex flex-column ">
  <h3 class="mb-3 text-center">Despesas</h3>

  <p-tabs value="0">
    <p-tablist>
      <p-tab value="0">Individual</p-tab>
      <p-tab value="1">Casal</p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel value="0">
        <p-table [value]="listaDespesasRecebida" [paginator]="true" [rows]="5" [rowsPerPageOptions]="[5, 10, 15]"
          [scrollable]="true" scrollHeight="400px" class="h-full">
          <ng-template #header>
            <tr>
              <th>Descrição</th>
              <th>Categoria</th>
              <th>Valor</th>
              <th>Tipo</th>
            </tr>
          </ng-template>
          <ng-template #body let-despesa>
            <tr>
              <td>{{ despesa.descricao }}</td>
              <td>{{ despesa.categoria.nome }}</td>
              <td>{{ despesa.valor }}</td>
              <td>{{ despesa.recorrencia.nome }}</td>
            </tr>
          </ng-template>
        </p-table>
      </p-tabpanel>

      <p-tabpanel value="1">
        <p-table [value]="listaDespesasRecebida" [paginator]="true" [rows]="5" [rowsPerPageOptions]="[5, 10, 15]"
          [scrollable]="true" scrollHeight="400px" class="h-full">
          <ng-template #header>
            <tr>
              <th>Descrição</th>
              <th>Categoria</th>
              <th>Valor</th>
              <th>Tipo</th>
            </tr>
          </ng-template>
          <ng-template #body let-despesa>
            <tr>
              <td>{{ despesa.descricao }}</td>
              <td>{{ despesa.categoria.nome }}</td>
              <td>{{ despesa.valor }}</td>
              <td>{{ despesa.recorrencia.nome }}</td>
            </tr>
          </ng-template>
        </p-table>
      </p-tabpanel>

    </p-tabpanels>
  </p-tabs>
</div>
