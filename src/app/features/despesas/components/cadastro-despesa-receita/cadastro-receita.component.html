<div class="overlay">
  <div class="modal-wrapper" (click)="$event.stopPropagation()">
    <p-card class="w-full bg-gray-50">
      <ng-template #title> Cadastro de Receita </ng-template>

      <form [formGroup]="formulario" class="w-full mt-3">
        <div class="flex flex-column mb-5">
          <label class=" block mb-1 text-sm font-medium text-gray-600" for="username">Descrição</label>
          <input formControlName="descricao" class=" w-full" id="username" pInputText autocomplete="off"
            [disabled]="cadastrando" />
        </div>

        <div class="flex gap-2 mb-5">
          <div class="flex flex-column flex-1">
            <label class="w-full text-gray-600" for="username">Valor</label>
            <p-inputnumber formControlName="valor" mode="currency" currency="BRL" locale="pt-BR" class="w-full"
              placeholder="R$ 00,00" [disabled]="cadastrando"></p-inputnumber>
          </div>
          <div class="flex flex-column flex-1">
            <label class=" w-full text-gray-600" for="username">Data</label>
            <p-datepicker formControlName="data" placeholder="dd/mm/yyyy" pInputMask="99/99/9999" dateFormat="dd/mm/yy"
              [disabled]="cadastrando" />
          </div>
        </div>




        @if(recorrente){
        <div class="card flex flex-column gap-1 items-start mb-4">
          <div class="flex items-center">
            <p-radiobutton formControlName="recorrencia" name="recorrencia" [value]="1" [disabled]="cadastrando" />
            <label class="ml-1">é uma despesa fixa</label>
          </div>

          <!-- <div class="flex items-center">
            <p-radiobutton formControlName="recorrencia" name="recorrencia" [value]="2" [disabled]="cadastrando" />
            <label class="ml-1">é um lançamento parcelado em </label>
          </div> -->



          <!-- @if(formulario.value.recorrencia == 2){
          <div class="flex items-center">
            <input formControlName="parcela" class="" id="parcela" pInputText autocomplete="off" />
          </div>
          <div class="flex items-center">
            <span>Serão lançadas {{numeroParcela}} parcelas de {{valorParcelas | currency:'BRL':'symbol':'1.2-2':'pt-BR'
              }}</span>
          </div>
          <div class="flex items-center ">
            <span>Em caso de divisão não exata, a sobra será somada à primeira parcela.</span>
          </div>
          }-->
        </div>
        }

        <div class="flex gap-2 mx-auto w-fit mb-3">
          <p-button label="Repetir" severity="secondary" icon="pi pi-arrow-right-arrow-left"
            (click)="recorrente =!recorrente" [disabled]="cadastrando" />


          <p-button label="Despesa Compartilhada" severity="secondary" icon="pi pi-users"
            (onClick)="compartilhada =!compartilhada" [severity]="compartilhada ? 'primary' : 'secondary'"
            [outlined]="compartilhada" />
        </div>

        <div class="flex gap-2 mx-auto w-fit">

          <p-button label="Cancelar" variant="text" severity="danger" (onClick)="fecharTela()"
            [disabled]="cadastrando" />
          <p-button [rounded]="true" icon="pi pi-check" size="large" [loading]="cadastrando"
            (onClick)="cadastrarDespesaFechando()" />
          <p-button label="Salvar e criar outra" variant="text" severity="success"
            (onClick)="cadastrarDespesaContinuando()" [disabled]="cadastrando" />
        </div>
      </form>
    </p-card>
  </div>
</div>
